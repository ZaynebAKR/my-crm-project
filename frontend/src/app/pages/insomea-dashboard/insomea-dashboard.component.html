<div class="dashboard-container">
    
  <div class="cards">
    <div class="card">
      <h3>Total Clients</h3>
      <p>{{ totalClients }}</p>
    </div>

    <div class="card">
      <h3>Total Vendors</h3>
      <p>{{ totalVendors }}</p>
    </div>

    <div class="card">
      <h3>Total Users</h3>
      <p>{{ totalUsers }}</p>
    </div>
  </div>

  <div class="table-section">
    <h2>Users List</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of users">
          <td>{{ u.id }}</td>
          <td>{{ u.username }}</td>
          <td>{{ u.role }}</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
