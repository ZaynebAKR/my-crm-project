<div class="container">
  <!-- Left Section -->
  <div class="left-box">
    <div class="logo-triangle">
      <img src="assets/Societé.png" alt="Logo" class="logo-image">
    </div>
    
    <h1>Welcome Back</h1>
    <p>Login to access your account and continue your learning journey with Easy Tutorials</p>
    <button class="btn-outline" routerLink="/aboutus">About Us</button>
  </div>

  <!-- Right Section (The White Form) -->
  <div class="right-box">
    <h2>Login Here</h2>
    
    <input 
      type="text" 
      [(ngModel)]="username" 
      placeholder="Username">
    
    <input 
      type="password" 
      [(ngModel)]="password" 
      placeholder="Password">
    
    <div class="button-container">
      <button class="btn-solid" (click)="login()">Login</button>
    </div>
    
    <p class="login-link">Don't have an account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
